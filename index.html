<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Room Customizer</title>
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

<script>

let selectedFurniture = "#chairModel";

function selectFurniture(type){

if(type==="chair") selectedFurniture="#chairModel";
if(type==="sofa") selectedFurniture="#sofaModel";
// if(type==="table") selectedFurniture="#tableModel";

}

AFRAME.registerComponent("place-furniture",{
init:function(){

this.el.addEventListener("click",(e)=>{

let furniture=document.createElement("a-entity");

furniture.setAttribute("gltf-model", selectedFurniture);
furniture.setAttribute("scale","2 2 2");

let pos=e.detail.intersection.point;

furniture.setAttribute("position",pos.x+" 0 "+pos.z);

document.querySelector("a-scene").appendChild(furniture);

});

}
});

</script>

<style>
.menu{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
background:white;
padding:15px;
border-radius:10px;
z-index:999;
}

button{
display:block;
margin:10px;
padding:10px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="menu">
<button onclick="selectFurniture('chair')">Chair</button>
<button onclick="selectFurniture('sofa')">Sofa</button>
<!-- <button onclick="selectFurniture('table')">Table</button> -->
</div>

<a-scene>
<a-assets>

<a-asset-item id="chairModel" src="Chair.glb"></a-asset-item>
<a-asset-item id="sofaModel" src="Sofa.glb"></a-asset-item>
<!-- <a-asset-item id="tableModel" src="table.glb"></a-asset-item> -->

</a-assets>
<a-sky color="skyblue"></a-sky>

<a-plane
class="clickable"
rotation="-90 0 0"
width="20"
height="20"
color="#cccccc"
place-furniture>
</a-plane>

<a-box position="0 2 -10" width="20" height="4" depth="0.2" color="white"></a-box>
<a-box position="0 2 10" width="20" height="4" depth="0.2" color="white"></a-box>
<a-box position="-10 2 0" width="0.2" height="4" depth="20" color="white"></a-box>
<a-box position="10 2 0" width="0.2" height="4" depth="20" color="white"></a-box>

<a-light type="ambient" intensity="1"></a-light>

<a-camera position="0 1.6 5">

<a-cursor
raycaster="objects: .clickable"
cursor="rayOrigin: mouse">
</a-cursor>

</a-camera>
</a-scene>

</body>
</html>
